<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --ink: #1a1a2e;
            --paper: #f5f0e8;
            --accent: #c84b31;
            --gold: #e8a838;
            --muted: #7a7060;
            --cream: #ede8dc;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: var(--paper);
            font-family: 'DM Sans', sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        nav {
            background: var(--ink);
            padding: 0 2rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 64px;
        }

        .logo {
            font-family: 'Playfair Display', serif;
            font-size: 1.6rem;
            color: var(--paper);
            text-decoration: none;
        }

        .logo span {
            color: var(--gold);
            font-style: italic;
        }

        .nav-link {
            color: #aaa;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .nav-link:hover {
            color: white;
        }

        .page {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 2.5rem;
            width: 100%;
            max-width: 440px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
        }

        .card-title {
            font-family: 'Playfair Display', serif;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .card-subtitle {
            color: var(--muted);
            font-size: 0.9rem;
            margin-bottom: 2rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: var(--muted);
            margin-bottom: 0.4rem;
        }

        .form-group input {
            width: 100%;
            padding: 0.8rem 1rem;
            border: 1.5px solid var(--cream);
            border-radius: 6px;
            font-size: 0.95rem;
            font-family: 'DM Sans', sans-serif;
            background: var(--paper);
            color: var(--ink);
            outline: none;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            border-color: var(--accent);
            background: white;
        }

        .btn-submit {
            width: 100%;
            padding: 0.9rem;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 1rem;
            font-weight: 500;
            font-family: 'DM Sans', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        .btn-submit:hover {
            background: #a83828;
        }

        .msg {
            padding: 0.75rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            margin-bottom: 1rem;
            display: none;
        }

        .msg.success {
            background: #e8f5e9;
            color: #2e7d32;
            display: block;
        }

        .msg.error {
            background: #fce8e6;
            color: #c62828;
            display: block;
        }

        .switch {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.88rem;
            color: var(--muted);
        }

        .switch a {
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
        }

        .switch a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

    <nav>
        <a href="index.html" class="logo">Write<span>well</span></a>
        <a href="register.html" class="nav-link">Register</a>
    </nav>

    <div class="page">
        <div class="card">
            <div class="card-title">Welcome back</div>
            <div class="card-subtitle">Login to your Writewell account</div>

            <div class="msg" id="msg"></div>

            <div class="form-group">
                <label>Username</label>
                <input type="text" id="username" placeholder="Your username" />
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Your password" />
            </div>

            <button class="btn-submit" onclick="login()">Login</button>

            <div class="switch">
                Don't have an account? <a href="register.html">Register</a>
            </div>
        </div>
    </div>
    <script>
        const API = '/api';
        async function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('msg');
            msg.className = 'msg';
            if (!username || !password) {
                msg.className = 'msg error';
                msg.textContent = 'All fielnds are required';
                return;
            }
            try {
                const res = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                const text = await res.text();
                if (text.includes('successful')) {
                    msg.className = 'msg success';
                    msg.textContent = 'Login successful! Redirecting...';
                    localStorage.setItem('user', username);
                    setTimeout(() => window.location.href = 'index.html', 1500);
                  
                } else {
                    msg.className = 'msg error';
                    msg.textContent = text;
                }
            } catch (error) {
                msg.className = 'msg error';
                msg.textContent = 'Could not connect to server. Make sure Spring Boot is running.';
            }
        }
    </script>
</body>

</html>
